apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kantin-ingress
spec:
  rules:
  - http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service # <-- Harus sama dengan name di Service k8s.yaml
            port:
              number: 5000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
