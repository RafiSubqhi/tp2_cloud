# --- BACKEND DEPLOYMENT ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend-container
        image: rafisuqbhi/backend-app:latest # Ganti dengan image kamu
        ports:
        - containerPort: 5000
        env: # <--- INJECTION VARIABLE DISINI
        - name: NAMA_PRAKTIKAN
          value: "Rafi Subqhi Nuraziz"
        - name: NIM_PRAKTIKAN
          value: "2408678"

---
# --- BACKEND SERVICE ---
apiVersion: v1
kind: Service
metadata:
  name: backend-service # <--- Harus sama dengan yang di ingress.yaml
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP # Sesuai instruksi: Hanya boleh lewat Ingress

---
# --- FRONTEND DEPLOYMENT ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend-container
        image: rafisuqbhi/frontend-app:latest # Ganti dengan image kamu
        ports:
        - containerPort: 80

---
# --- FRONTEND SERVICE ---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service # <--- Harus sama dengan yang di ingress.yaml
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP # Sesuai instruksi: Hanya boleh lewat Ingress