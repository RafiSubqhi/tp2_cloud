# --- BACKEND DEPLOYMENT ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-kantin
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend-api
        image: rafisuqbhi/kantin-backend:latest
        ports:
        - containerPort: 5000
        env:
        - name: PEMILIK_NAMA
          value: "Rafi Subqhi Nuraziz"
        - name: PEMILIK_NIM
          value: "2408678"
