apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kantin-ingress
  labels:
    app: kantin
spec:
  rules:
  - host: kantin.local
    http:
      paths:
      # Jalur untuk API Backend
      # Ini akan meneruskan http://kantin.local/api ke backend-service:5000
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 5000
      # Jalur untuk Frontend (Root)
      # Ini akan meneruskan http://kantin.local/ ke frontend-service:80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
