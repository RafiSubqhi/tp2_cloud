apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kantin-ingress
  annotations:
    # Penting agar routing ke backend API tidak terganggu oleh routing frontend
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: kantin.local
    http:
      paths:
      # Routing untuk Backend (API)
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 5000
      # Routing untuk Frontend
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80