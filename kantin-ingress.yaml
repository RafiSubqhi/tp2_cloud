apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kantin-ingress
  annotations:
    # Kita tambahkan ini lagi tapi dengan format yang lebih kuat
    nginx.ingress.kubernetes.io/rewrite-target: /api/info
spec:
  rules:
  - http:
      paths:
      - path: /api/info
        pathType: Exact
        backend:
          service:
            name: backend-service
            port:
              number: 5000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
